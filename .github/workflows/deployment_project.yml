name: CI-CD Pipeline (Build + Deploy)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  APP_NAME: Ecomm
  TOMCAT_URL: http://3.110.87.184:8080

jobs:

  # =========================
  # 🔹 BUILD STAGE (CI)
  # =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Verify build output
        run: ls -l target/

      # 🔹 Upload WAR as artifact to pass to deploy job
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-file
          path: target/${{ env.APP_NAME }}.war


  # =========================
  # 🔹 DEPLOY STAGE (CD)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build   # 👈 important dependency

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: war-file

      - name: Deploy to Tomcat
        run: |
          curl -v -u ${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }} \
          -T ${{ env.APP_NAME }}.war \
          "${{ env.TOMCAT_URL }}/manager/text/deploy?path=/${{ env.APP_NAME }}&update=true"

      - name: Verify deployment
        run: |
          curl -u ${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }} \
          "${{ env.TOMCAT_URL }}/manager/text/list"
