name: Build with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest    #defined host runner

    steps:
      - name: Checkout code   
        uses: actions/checkout@v4   # pre-defined for download the code from repo into that defined host runner

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # pre-defined
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --file pom.xml
