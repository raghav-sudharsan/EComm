name: Build with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --file pom.xml
		
	  - name: Deploy Ecomm-app to TomcatServer
	    run: curl -v -U admin:admin -T /home/runner/work/etoe/etoe/target/Ecomm.war 'http://13.126.212.118:8080/manager/text/deploy?path=/Ecomm.war'
