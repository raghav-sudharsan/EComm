name: Build with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest    #defined host runner

    steps:
      - name: Checkout code   
        uses: actions/checkout@v4   # pre-defined for download the code from repo into that defined host runner

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # pre-defined
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --file pom.xml

      - name: Deploy Ecomm-app to TomcatServer
        run: curl -v -u admin:admin -T /home/runner/work/EComm/EComm/target/Ecomm.war 'http://13.232.195.168:8080/manager/text/deploy?path=/Ecomm.war'
