name: Deploy Application with Maven and Tomcat

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  APP_NAME: Ecomm
  TOMCAT_URL: http://13.232.195.168:8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # GitHub-hosted runner

    steps:
      # 🔹 Step 1: Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # 🔹 Step 2: Setup Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 🔹 Step 3: Build application using Maven
      - name: Build with Maven
        run: mvn clean package

      # 🔹 Step 4: Verify build artifact (debug step)
      - name: Verify WAR file
        run: ls -l target/

      # 🔹 Step 5: Deploy WAR to Apache Tomcat
      - name: Deploy to Tomcat
        run: curl -v -u admin:admin -T /home/runner/work/EComm/EComm/target/Ecomm.war 'http://13.232.195.168:8080/manager/text/deploy?path=/Ecomm.war'
